name: Deploy Cloud Automation Lab

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Configure AWS credentials (BEST PRACTICE)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      # 3. Install Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # 4. Terraform Init
      - name: Terraform Init
        run: |
          cd terraform
          terraform init

      # 5. Terraform Apply
      - name: Terraform Apply
        run: |
          cd terraform
          terraform apply -auto-approve

      # 6. Extract Public IP dynamically
      - name: Get EC2 Public IP
        run: |
          cd terraform
          echo "EC2_IP=$(terraform output -raw public_ip)" >> $GITHUB_ENV

      # 7. Setup SSH Key
      - name: Setup SSH key
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > key.pem
          chmod 400 key.pem

      # 8. Install Ansible
      - name: Install Ansible
        run: |
          sudo apt update
          sudo apt install -y ansible

      # 9. Create dynamic inventory
      - name: Create inventory
        run: |
          echo "[web]" > inventory.ini
          echo "$EC2_IP ansible_user=ubuntu ansible_ssh_private_key_file=key.pem ansible_ssh_common_args='-o StrictHostKeyChecking=no'" >> inventory.ini

      # 10. Run Ansible
      - name: Run Ansible Playbook
        run: |
          ansible-playbook -i inventory.ini ansible-lab/nginx.yml
